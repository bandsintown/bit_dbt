service: bit-dbt-airflow

provider:
  name: aws
  runtime: python3.11
  profile: ${opt:aws-profile}
  stage: ${opt:stage, 'prod'}
  region: ${opt:region, 'us-east-1'}
  logRetentionInDays: 14
  versionFunctions: false
  deploymentBucket:
    name: bit-dbt-${opt:stage, 'prod'}

custom:
  vars: ${file(variables.yml):${self:provider.stage}}

resources:
  - ${file(resources/s3.yml)}
  - ${file(resources/iam.yml)}
  - ${file(resources/airflow.yml)}

