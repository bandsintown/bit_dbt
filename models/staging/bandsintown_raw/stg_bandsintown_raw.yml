version: 2

models:
  - name: stg_events
    description: Staging model for events data with basic transformations and data quality checks
    columns:
      - name: event_id
        description: Primary key for events
        tests:
          - not_null
          - unique
      
      - name: artist_id
        description: Foreign key to artists
        tests:
          - not_null
      
      - name: venue_id
        description: Foreign key to venues
      
      - name: event_date
        description: Full timestamp of the event
        tests:
          - not_null
      
      - name: event_date_only
        description: Date portion of the event (without time)
      
      - name: event_month
        description: Year-month of the event (YYYY-MM format)
      
      - name: event_year
        description: Year of the event
      
      - name: event_status
        description: Status of the event
        tests:
          - accepted_values:
              values: ['upcoming', 'cancelled', 'postponed', 'past']
      
      - name: ticket_url
        description: URL to purchase tickets
      
      - name: created_at
        description: Timestamp when record was created
      
      - name: updated_at
        description: Timestamp when record was last updated
      
      - name: is_valid_status
        description: Flag indicating if event_status is valid
        tests:
          - not_null

