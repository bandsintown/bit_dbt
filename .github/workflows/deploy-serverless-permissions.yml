name: Deploy Serverless Permissions

on:
  workflow_dispatch:
    inputs:
      stage:
        description: "Deployment stage"
        required: true
        default: "prod"
      region:
        description: "AWS region"
        required: true
        default: "us-east-1"
  push:
    branches:
      - main
    paths:
      - environment/serverless.permissions.yml
      - environment/resources/iam.yml
      - environment/variables.yml
      - .github/workflows/deploy-serverless-permissions.yml

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ github.event.inputs.region || 'us-east-1' }}

      - name: Install Serverless CLI
        run: npm install -g serverless@3

      - name: Deploy permissions stack
        run: |
          serverless deploy \
            --config environment/serverless.permissions.yml \
            --stage "${{ github.event.inputs.stage || 'prod' }}" \
            --region "${{ github.event.inputs.region || 'us-east-1' }}"

