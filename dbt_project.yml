name: 'bandsintown'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'bandsintown'

# These configurations specify where dbt should look for different types of files.
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"
  - "logs"

# Require explicit project references in sources and models
require-dbt-version: [">=1.7.0", "<2.0.0"]

# Global model configurations
models:
  bandsintown:
    staging:
      +materialized: view
      +tags: ["staging"]
    intermediate:
      +materialized: view
      +tags: ["intermediate"]
    marts:
      +materialized: table
      +tags: ["marts"]
      +format: parquet
      +write_compression: snappy
      core:
        +schema: analytics
      boosted_events:
        +schema: bit_dbt_boosted_events
# Documentation
vars:
  # Timezone for timestamp conversions
  timezone: 'America/Los_Angeles'
  
  # Default start date for incremental models
  default_start_date: '2024-01-01'

# Test configurations
tests:
  +store_failures: true
  +schema: dbt_test_failures

# Seeds configuration
seeds:
  bandsintown:
    +schema: bit_dbt_boosted_events
    +quote_columns: false
    seed_came_from_traffic_source:
      +column_types:
        came_from: integer
        traffic_source_category: varchar
    seed_venue_capacity_tiers:
      +column_types:
        venue_capacity_min: integer
        venue_capacity_max: integer
        venue_size_bucket: varchar
        tier_price: double
    seed_artist_size_buckets:
      +column_types:
        tracker_count_min: integer
        tracker_count_max: integer
        artist_size_bucket: varchar

